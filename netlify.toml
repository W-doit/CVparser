[build]
  command = "mkdir -p .netlify/functions && cp netlify/functions/* .netlify/functions/ && pip install --upgrade pip && pip install numpy==1.24.3 && pip install -r requirements.txt"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = ".netlify/functions"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/handler/:splat"
  status = 200
