[build]
  command = "cd api && pip install --upgrade pip && pip install numpy==1.24.3 && pip install -r requirements.txt"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/handler/:splat"
  status = 200

[functions]
  directory = "api"
  included_files = ["api/**"]
