name: Keep Render Service Active

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: |
          echo "Pinging API to keep it active..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://talenderu-cvparser.onrender.com/health)
          if [ $response -eq 200 ]; then
            echo "✅ API is alive (HTTP $response)"
          else
            echo "⚠️ API returned HTTP $response"
          fi
